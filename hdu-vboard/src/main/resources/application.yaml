spring:
  application:
    name: hdu-fpga
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: cea83c1b-7a99-4bb1-8596-895a4faab520
  redis:
    host: localhost
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: MySQL142536
    url: jdbc:mysql://localhost:3306/hdu-interrupt?allowMultiQueries=true&useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
seata:
  service:
    vgroup-mapping:
      hdu-account-seata-service-group: default
      hdu-interrupt-seata-service-group: default
      hdu-fpga-seata-service-group: default
      hdu-record-seata-service-group: default
    grouplist:
      default: localhost:8091
server:
  port: 9999
netty:
  port: 60020
  boss:
    thread:
      count: 2
  worker:
    thread:
      count: 2
  keepalive : false
  backlog: 100
wait-queue:
  name: "queue:fpgaWaitLine"
dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://localhost:8848
    group: dubbo
    register-mode: interface
    parameters:
      namespace: c29600b0-2e5d-450b-bab0-e56d78292d51
  metadata-report:
    address: nacos://localhost:8848
logging:
  level:
    com.hdu.vboard: debug