<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation Interface</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        h1, h2 {
            color: #333;
        }

        form, .actions, .output-container {
            width: 80%;
            max-width: 600px;
            margin: 20px 0;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        form label, input, button {
            display: block;
            width: 100%;
            margin-bottom: 10px;
        }

        input[type="file"], input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background-color: #007BFF;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #status {
            font-size: 14px;
            margin-bottom: 10px;
            color: #555;
        }

        pre {
            background-color: #f9f9f9;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow: auto;
            max-height: 400px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<h1>Simulation Interface</h1>
<form id="uploadForm">
    <h2>Upload Files for Simulation</h2>
    <label for="verilogFile">Upload Verilog File:</label>
    <input type="file" id="verilogFile" name="verilogFile" required>

    <label for="bindFile">Upload Bind File (JSON):</label>
    <input type="file" id="bindFile" name="bindFile" required>

    <button type="submit">Start Simulation</button>
</form>

<div class="actions">
    <h2>Simulation Controls</h2>
    <button id="stopSimulation" class="hidden">Stop Simulation</button>
    <label for="signalInput">Send Signal (Manual Input):</label>
    <input type="text" id="signalInput" placeholder="Enter signal JSON">

    <label for="signalFile">Send Signal (File Input):</label>
    <input type="file" id="signalFile">

    <button id="sendSignal" class="hidden">Send Signal</button>
</div>

<div class="output-container">
    <h2>Simulation Output</h2>
    <div id="status">Connecting to WebSocket...</div>
    <pre id="output"></pre>
</div>

<script>
    const uploadForm = document.getElementById('uploadForm');
    const stopButton = document.getElementById('stopSimulation');
    const sendSignalButton = document.getElementById('sendSignal');
    const signalInput = document.getElementById('signalInput');
    const signalFileInput = document.getElementById('signalFile');
    const statusDiv = document.getElementById('status');
    const outputDiv = document.getElementById('output');

    let isSimulationRunning = false;
    const token = localStorage.getItem("token") || "mock-token"; // 从本地获取 token（你也可以改为手动填写）

    // Handle File Upload and Start Simulation
    uploadForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const verilogFile = document.getElementById('verilogFile').files[0];
        const bindFile = document.getElementById('bindFile').files[0];

        if (!verilogFile || !bindFile) {
            statusDiv.textContent = "请上传 Verilog 文件和 Bind 文件。";
            return;
        }

        const formData = new FormData();
        formData.append('verilogFile', verilogFile);
        formData.append('bindFile', bindFile);

        statusDiv.textContent = "正在上传文件并启动仿真...";

        try {
            const response = await fetch('/vb/simulate', {
                method: 'POST',
                headers: {
                    'token': token
                },
                body: formData
            });

            const result = await response.json();

            if (!result.success) {
                throw new Error(result.message || "启动失败");
            }

            statusDiv.textContent = "仿真已启动，等待输出...";
            outputDiv.textContent = JSON.stringify(result, null, 2);

            isSimulationRunning = true;
            stopButton.style.display = "inline-block";
            sendSignalButton.style.display = "inline-block";
        } catch (error) {
            statusDiv.textContent = "启动仿真失败：" + error.message;
        }
    });

    // Handle Stop Simulation
    stopButton.addEventListener('click', async () => {
        try {
            const response = await fetch('/vb/finish', {
                method: 'POST',
                headers: {
                    'token': token
                }
            });

            const result = await response.json();
            if (!result.success) {
                throw new Error(result.message || "停止失败");
            }

            isSimulationRunning = false;
            statusDiv.textContent = "仿真已停止。";
            stopButton.style.display = "none";
            sendSignalButton.style.display = "none";
            outputDiv.textContent = JSON.stringify(result, null, 2);
        } catch (error) {
            statusDiv.textContent = "停止仿真失败：" + error.message;
        }
    });

    // Handle Send Signal
    sendSignalButton.addEventListener('click', async () => {
        let signalData;

        if (signalFileInput.files.length > 0) {
            const file = signalFileInput.files[0];
            signalData = await file.text();
        } else {
            signalData = signalInput.value;
        }

        if (!signalData.trim()) {
            statusDiv.textContent = "请输入或上传信号数据。";
            return;
        }

        const payload = {
            data: signalData
        };

        try {
            const response = await fetch('/vb/signal', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'token': token
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            if (!result.success) {
                throw new Error(result.message || "发送信号失败");
            }

            statusDiv.textContent = "信号发送成功。";
            outputDiv.textContent = JSON.stringify(result, null, 2);
        } catch (error) {
            statusDiv.textContent = "发送信号失败：" + error.message;
        }
    });
</script>

</body>
</html>
