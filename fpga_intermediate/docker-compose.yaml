name: fpga_intermediate
version: "3.9"
services:
  mysql:
    image: mysql:latest
    container_name: mysql
    hostname: mysql
    user: "0"
    environment:
      MYSQL_ROOT_PASSWORD: MySQL142536
      MYSQL_DATABASE: nacos
      MYSQL_USER: nacos
      MYSQL_PASSWORD: MySQL142536
    ports:
      - 3306:3306
    volumes:
      - ~/Desktop/workbench/db/mysql/init:/docker-entrypoint-initdb.d
      - ~/Desktop/workbench/db/mysql/data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pMySQL142536"]
      interval: 30s
      timeout: 90s
      retries: 5
      start_period: 30s

  nacos:
    image: nacos/nacos-server:2.0.2
    container_name: nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: localhost
      MYSQL_SERVICE_HOST: localhost
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: MySQL142536
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_DB_PARAM: useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    ports:
      - 8848:8848
      - 9848:9848
      - 9849:9849
      - 7848:7848
    depends_on:
      - mysql

  seata:
    image: seataio/seata-server:2.0.0
    container_name: seata
    environment:
      SEATA_CONFIG_NAME: file:/root/seata-config/registry
    ports:
      - 8091:8091
    volumes:
      - ~/Desktop/workbench/hdu_willow/fpga_intermediate/source/seata-config:/root/seata-config
    depends_on:
      - nacos

  redis:
    image: redis:6.2.7
    container_name: redis
    user: "0"  # run as root user
    ports:
      - 6379:6379
    volumes:
      - type: bind
        source: ~/Desktop/workbench/hdu_willow/fpga_intermediate/source/redis.conf
        target: /usr/local/etc/redis/redis.conf
      - type: bind
        source: ~/Desktop/workbench/hdu_willow/fpga_intermediate/source/redis.log
        target: /var/log/redis.log
      - /workspace/fpga/backend/redis-data:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    environment:
      SPRING_DATASOURCE_PLATFORM: localhost

  zookeeper:
    image: zookeeper:3.9.3
    container_name: zookeeper
    ports:
      - 2181:2181
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535

  namesrv:
    image: apache/rocketmq:5.3.1
    container_name: rmqnamesrv
    ports:
      - 9876:9876
    command: ["sh", "mqnamesrv"]
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535

  broker:
    image: apache/rocketmq:5.3.1
    container_name: rmqbroker
    ports:
      - 10909:10909
      - 10911:10911
      - 10912:10912
    environment:
      - NAMESRV_ADDR=localhost:9876
    depends_on:
      - namesrv
    command: ["sh", "mqbroker", "-c", "/opt/rocketmq-5.3.1/conf/broker.conf"]
    volumes:
      - type: bind
        source: ~/Desktop/workbench/hdu_willow/fpga_intermediate/source/broker.conf
        target: /opt/rocketmq-5.3.1/conf/broker.conf
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535