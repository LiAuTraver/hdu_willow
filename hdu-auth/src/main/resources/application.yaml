server:
  port: 9000
  servlet:
    context-path: /sso
    encoding:
      charset: UTF-8
spring:
  # profiles:
  #   active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: MySQL142536
    url: jdbc:mysql://localhost:3306/hdu-interrupt?allowMultiQueries=true&useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
  application:
    name: hdu-auth
  redis:
    host: localhost
    port: 6379
    database: 2
dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://localhost:8848
    group: dubbo
    register-mode: interface
    parameters:
      namespace: local-namespace
  metadata-report:
    address: nacos://localhost:8848
seata:
  service:
    vgroup-mapping:
      hdu-account-seata-service-group: default
      hdu-interrupt-seata-service-group: default
      hdu-fpga-seata-service-group: default
      hdu-record-seata-service-group: default
      hdu-auth-seata-service-group: default
    grouplist:
      default: localhost:8091