apiVersion: apps/v1
kind: Deployment
metadata:
  name: rmqnamesrv
  namespace: fpga
spec:
  selector:
    matchLabels:
      app: rmqnamesrv
  template:
    metadata:
      labels:
        app: rmqnamesrv
    spec:
      containers:
        - name: rmqnamesrv
          image: apache/rocketmq:5.3.1
          command: ["sh", "mqnamesrv"]
          ports:
            - containerPort: 9876
---
apiVersion: v1
kind: Service
metadata:
  name: rmqnamesrv
  namespace: fpga
spec:
  selector:
    app: rmqnamesrv
  ports:
    - port: 9876
      targetPort: 9876
  type: NodePort
