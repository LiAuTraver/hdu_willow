spring:
  cloud:
    gateway:
      discovery:
        locator:
          lower-case-service-id: true
      routes:
        - id: hdu-account
          uri: lb://hdu-account
          predicates:
            - Path=/account/**
          filters:
            - StripPrefix=1
        - id: hdu-interrupt
          uri: lb://hdu-interrupt
          predicates:
            - Path=/interrupt/**
          filters:
            - StripPrefix=1
        - id: hdu-record
          uri: lb://hdu-record
          predicates:
            - Path=/record/**
          filters:
            - StripPrefix=1
        - id: hdu-fpga
          uri: lb://hdu-fpga
          predicates:
            - Path=/fpga/**
          filters:
            - StripPrefix=1
        - id: hdu-vboard
          uri: lb://hdu-vboard
          predicates:
            - Path=/vboard/**
          filters:
            - StripPrefix=1
      globalcors: #cross-domain configuration
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://127.0.0.1:8080" #allow cross-domain
              - "http://127.0.0.1:8081"
              - "http://127.0.0.1:8082"
              - "http://127.0.0.1:8083"
            allow-credentials: true
            allowed-headers: "*"
            allowedMethods: #request methods
              - GET
              - POST
              - DELETE
              - PUT
              - PATCH
              - OPTIONS
              - HEAD
              - CONNECT
              - TRACE
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: cea83c1b-7a99-4bb1-8596-895a4faab520
  application:
    name: hdu-gateway
server:
  port: 8501